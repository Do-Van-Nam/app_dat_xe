name: demo_app
description: "A new Flutter project."
# The following line prevents the package from being accidentally published to
# pub.dev using `flutter pub publish`. This is preferred for private packages.
publish_to: 'none' # Remove this line if you wish to publish to pub.dev

# The following defines the version and build number for your application.
# A version number is three numbers separated by dots, like 1.2.43
# followed by an optional build number separated by a +.
# Both the version and the builder number may be overridden in flutter
# build by specifying --build-name and --build-number, respectively.
# In Android, build-name is used as versionName while build-number used as versionCode.
# Read more about Android versioning at https://developer.android.com/studio/publish/versioning
# In iOS, build-name is used as CFBundleShortVersionString while build-number is used as CFBundleVersion.
# Read more about iOS versioning at
# https://developer.apple.com/library/archive/documentation/General/Reference/InfoPlistKeyReference/Articles/CoreFoundationKeys.html
# In Windows, build-name is used as the major, minor, and patch parts
# of the product and file versions while build-number is used as the build suffix.
version: 8.0.0+2500

environment:
  sdk: ">=3.4.0 <4.0.0"

# Dependencies specify other packages that your package needs in order to work.3.10.3
# To automatically upgrade your package dependencies to the latest versions
# consider running `flutter pub upgrade --major-versions`. Alternatively,
# dependencies can be manually updated by changing the version numbers below to
# the latest version available on pub.dev. To see which dependencies have newer
# versions available, run `flutter pub outdated`.
dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter

  # The following adds the Cupertino Icons font to your application.
  # Use with the CupertinoIcons class for iOS style icons.
  cupertino_icons: ^1.0.8
  go_router: ^17.0.0
  flutter_bloc: ^9.1.1
  equatable: ^2.0.7
  flutter_screenutil: ^5.9.3
  flutter_svg: ^2.2.3
  shared_preferences: ^2.5.4
  dio: ^5.9.0
  logger: ^2.6.2
  path_provider: ^2.1.5
  intl: 0.20.2
  device_info_plus: ^11.2.0
  package_info_plus: ^8.1.0
  flutter_launcher_icons: ^0.14.4
  animations: ^2.1.1
  google_maps_flutter: ^2.6.0
  firebase_core: ^2.32.0
  firebase_crashlytics: ^3.5.7
  firebase_messaging: ^14.7.10
  flutter_rating_bar: ^4.0.1
  url_launcher: ^6.3.0
  webview_flutter: ^4.7.0
  carousel_slider: ^5.1.1
  flutter_speed_dial: ^7.0.0
  cached_network_image: ^3.4.1
  flutter_slidable: ^4.0.3
  dotted_dashed_line: ^0.0.3
  fdottedline_nullsafety: ^2.0.1 
  # myid_kyc_plugin:
  #   path: ./myid_kyc_plugin
  # ipcc_plugin:
  #   path: ./ipcc_plugin
  # speed_test_plugin:
  #   path: ./speed_test_plugin
  sms_autofill: ^2.4.1
  app_links: ^7.0.0
  flutter_local_notifications: ^17.2.3
  flutter_native_splash: ^2.4.7
  firebase_remote_config: ^4.4.7
  flutter_html: ^3.0.0
  pin_code_fields: ^8.0.1
  image_picker: ^1.2.1
  dropdown_button2: ^2.0.0
  marquee: ^2.2.3
  connectivity_plus: ^4.0.0
  calendar_date_picker2: ^0.5.2
  geolocator: ^10.1.0
  geocoding: ^2.1.0
  dropdown_search: ^6.0.1
  buttons_tabbar: ^1.3.15 
  drift: ^2.30.1         
  sqlite3_flutter_libs: ^0.5.41
  freezed: ^3.0.0
  freezed_annotation: ^3.1.0 
dev_dependencies:
  drift_dev: ^2.30.1
  build_runner: ^2.10.5
  flutter_test:
    sdk: flutter

  flutter_lints: ^5.0.0
flutter_native_splash:
  ios: true
  android: true

  color: "#FFFFFF"

  image_ios: assets/splash_icon.png
  image_android: assets/app_icon.png

  android_12:
    image: assets/app_icon.png
    color: "#FFFFFF"
  # update chạy lệnh flutter pub run flutter_native_splash:create

flutter_icons:
  android: true
  ios: true
  image_path: "assets/adaptive_icon.png"
  adaptive_icon_background: "#ffffff" # Chỉ dùng cho Android (tùy chọn)
  adaptive_icon_foreground: "assets/adaptive_icon.png" # Chỉ dùng cho Android (tùy chọn)
  #  update chay lenh: flutter pub run flutter_launcher_icons
flutter:
  generate: true
  # The following line ensures that the Material Icons font is
  # included with your application, so that you can use the icons in
  # the material Icons class.
  uses-material-design: true

  # To add assets to your application, add an assets section, like this:
  assets:
    - assets/
    - assets/icons/
    - assets/images/
  fonts:
    - family: Poppins
      fonts:
        - asset: assets/fonts/Poppins-Thin.ttf       # w100
          weight: 100
        - asset: assets/fonts/Poppins-ExtraLight.ttf # w200
          weight: 200
        - asset: assets/fonts/Poppins-Light.ttf      # w300
          weight: 300
        - asset: assets/fonts/Poppins-Regular.ttf    # w400
          weight: 400
        - asset: assets/fonts/Poppins-Medium.ttf     # w500
          weight: 500
        - asset: assets/fonts/Poppins-SemiBold.ttf   # w600
          weight: 600
        - asset: assets/fonts/Poppins-Bold.ttf       # w700
          weight: 700
        - asset: assets/fonts/Poppins-ExtraBold.ttf  # w800
          weight: 800
        - asset: assets/fonts/Poppins-Black.ttf      # w900
          weight: 900
